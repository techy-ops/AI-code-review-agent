<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sign Up | AI Code Review &amp; Rewrite</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7f0df2",
                        "background-light": "#f7f5f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-card {
            background: rgba(38, 24, 52, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(127, 13, 242, 0.2);
        }

        .glow-effect {
            box-shadow: 0 0 40px -10px rgba(127, 13, 242, 0.3);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display selection:bg-primary/30">
    <!-- Background Decorative Elements -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/20 rounded-full blur-[120px]"></div>
        <div class="absolute top-[20%] -right-[5%] w-[30%] h-[30%] bg-primary/10 rounded-full blur-[100px]"></div>
        <div class="absolute -bottom-[10%] left-[20%] w-[50%] h-[40%] bg-primary/15 rounded-full blur-[130px]"></div>
    </div>
    <!-- Navigation (Simplified from Component List) -->
    <nav class="relative z-10 w-full px-6 py-6 lg:px-20">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2 group cursor-pointer">
                <div class="bg-primary p-1.5 rounded-lg text-white">
                    <span class="material-symbols-outlined text-2xl">terminal</span>
                </div>
                <span class="text-slate-900 dark:text-slate-100 text-xl font-bold tracking-tight">AI Code Review</span>
            </div>
            <div class="hidden md:flex items-center gap-8">
                <a class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors"
                    href="/">Features</a>
                <a class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors"
                    href="/pricing/pricing.html">Pricing</a>
                <a class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors"
                    href="/platform_documentation/documentation.html">Docs</a>
            </div>
        </div>
    </nav>
    <!-- Main Content -->
    <main class="relative z-10 flex-1 flex items-center justify-center p-6 lg:p-10">
        <div class="w-full max-w-[500px]">
            <!-- Sign Up Card -->
            <div class="glass-card rounded-xl p-8 lg:p-10 glow-effect">
                <div class="text-center mb-10">
                    <h1 class="text-3xl font-extrabold text-slate-900 dark:text-slate-100 mb-3 tracking-tight">Create an
                        account</h1>
                    <p class="text-slate-600 dark:text-slate-400">Join the revolution of AI-powered code auditing.</p>
                </div>
                <form class="space-y-5">
                    <!-- Full Name -->
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Full Name</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">person</span>
                            <input
                                class="w-full pl-11 pr-4 py-3.5 bg-background-light/50 dark:bg-background-dark/50 border border-slate-200 dark:border-primary/20 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-600"
                                placeholder="John Doe" type="text" />
                        </div>
                    </div>
                    <!-- Email -->
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Email
                            Address</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">alternate_email</span>
                            <input
                                class="w-full pl-11 pr-4 py-3.5 bg-background-light/50 dark:bg-background-dark/50 border border-slate-200 dark:border-primary/20 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-600"
                                placeholder="name@company.com" type="email" />
                        </div>
                    </div>
                    <!-- Password -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label
                                class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Password</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">lock</span>
                                <input
                                    class="w-full pl-11 pr-4 py-3.5 bg-background-light/50 dark:bg-background-dark/50 border border-slate-200 dark:border-primary/20 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-600"
                                    placeholder="••••••••" type="password" />
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Confirm</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">verified_user</span>
                                <input
                                    class="w-full pl-11 pr-4 py-3.5 bg-background-light/50 dark:bg-background-dark/50 border border-slate-200 dark:border-primary/20 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-600"
                                    placeholder="••••••••" type="password" />
                            </div>
                        </div>
                    </div>
                    <!-- Create Account Button -->
                    <button onclick="event.preventDefault(); window.location.href='/'"
                        class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group"
                        type="submit">
                        Create Account
                        <span
                            class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
                    </button>
                    <!-- Divider -->
                    <div class="relative py-4">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-slate-200 dark:border-primary/10"></div>
                        </div>
                        <div class="relative flex justify-center text-xs uppercase">
                            <span class="bg-transparent px-4 text-slate-500 font-semibold tracking-widest">Or continue
                                with</span>
                        </div>
                    </div>
                    <!-- Social Login -->
                    <button onclick="window.location.href='/'"
                        class="w-full bg-slate-100 dark:bg-white/5 hover:bg-slate-200 dark:hover:bg-white/10 text-slate-900 dark:text-slate-100 font-semibold py-3.5 rounded-lg border border-slate-200 dark:border-white/10 transition-all flex items-center justify-center gap-3"
                        type="button">
                        <svg class="w-5 h-5" viewbox="0 0 24 24">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4"></path>
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853"></path>
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.26.81-.58z"
                                fill="#FBBC05"></path>
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335"></path>
                        </svg>
                        Sign in with Google
                    </button>
                </form>
                <!-- Login Redirect -->
                <div class="mt-8 text-center">
                    <p class="text-slate-600 dark:text-slate-400">
                        Already have an account?
                        <a class="text-primary font-bold hover:underline underline-offset-4 decoration-2"
                            href="/login/login.html">Login</a>
                    </p>
                </div>
            </div>
            <!-- Footer Text -->
            <p class="mt-8 text-center text-xs text-slate-500 dark:text-slate-600">
                By creating an account, you agree to our
                <a class="underline" href="/platform_documentation/documentation.html">Terms of Service</a> and
                <a class="underline" href="/platform_documentation/documentation.html">Privacy Policy</a>.
            </p>
        </div>
    </main>
    <!-- Subtle Glow Dots -->
    <div class="fixed top-1/4 left-1/4 w-2 h-2 bg-primary rounded-full blur-[2px] opacity-40"></div>
    <div class="fixed bottom-1/3 right-1/4 w-3 h-3 bg-primary rounded-full blur-[3px] opacity-30"></div>
    <div class="fixed top-2/3 left-10 w-1.5 h-1.5 bg-primary rounded-full blur-[1px] opacity-20"></div>
</body>

</html>
